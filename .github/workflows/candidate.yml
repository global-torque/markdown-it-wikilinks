name: Candidate artifact

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build once and attest
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-24.04
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Check out protected tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Verify tag and install
        shell: bash
        run: |
          set -euo pipefail
          test "v$(node -p "require('./package.json').version")" = "${GITHUB_REF_NAME}"
          pnpm install --frozen-lockfile
      - name: Run package gates
        run: pnpm run ci
      - name: Build and pack final candidate once
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist release
          pnpm run build
          mkdir release
          pnpm pack --pack-destination release
          node scripts/create-release-manifest.mjs release
      - name: Select SHA-512 subject checksum
        id: subject
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          checksums=(release/*.tgz.sha512)
          test "${#checksums[@]}" -eq 1
          printf 'checksums=%s\\n' "${checksums[0]}" >> "${GITHUB_OUTPUT}"
      - name: Attest candidate
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: ${{ steps.subject.outputs.checksums }}
      - name: Download offline attestation bundle
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          artifact=$(find release -maxdepth 1 -name '*.tgz' -print -quit)
          for attempt in 1 2 3 4 5; do
            if (cd release && gh attestation download "$(basename "${artifact}")" --repo "${GITHUB_REPOSITORY}" --digest-alg sha512); then
              exit 0
            fi
            sleep 5
          done
          exit 1
      - name: Retain exact candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: candidate-${{ github.sha }}
          path: release/*
          if-no-files-found: error
          retention-days: 90

  clean-room:
    name: ${{ matrix.manager }} / Node ${{ matrix.node }}
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        manager:
          - npm
          - pnpm
        node:
          - 22.23.1
          - 24.18.0
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
      - name: Download exact candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: candidate-${{ github.sha }}
          path: release
      - name: Verify installed bytes and all public imports
        run: node scripts/verify-installed-artifact.mjs release "${{ matrix.manager }}"

  draft-prerelease:
    name: Create immutable draft prerelease
    needs:
      - build
      - clean-room
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download exact candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: candidate-${{ github.sha }}
          path: release
      - name: Create draft prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          test "v${version}" = "${GITHUB_REF_NAME}"
          gh release create "${GITHUB_REF_NAME}" release/* \
            --draft \
            --prerelease \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes "Immutable candidate from ${GITHUB_SHA}. Publish this draft only after the named real-consumer gate and public release issue are complete."
